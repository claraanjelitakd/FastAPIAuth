{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-10 rounded-3xl">
        <h2 class="text-3xl font-bold text-white mb-2">Reset Password</h2>
        <p class="text-gray-400 mb-8 text-sm">Please enter your new password below.</p>
        
        <form id="resetForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">New Password</label>
                <input type="password" id="password" required class="w-full bg-[#151515] border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Confirm New Password</label>
                <input type="password" id="confirm_password" required class="w-full bg-[#151515] border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-red-900/40">
                Update Password
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('resetForm').onsubmit = async (e) => {
        e.preventDefault();
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;
        
        if (password !== confirm) {
            alert('Passwords do not match');
            return;
        }
        
        try {
            const response = await fetch('/api/v1/reset-password/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: password })
            });
            const data = await response.json();
            
            if (response.ok) {
                alert('Password updated successfully! Redirecting to login.');
                window.location.href = '/login';
            } else {
                alert(data.detail || 'Failed to reset password');
            }
        } catch (err) {
            alert('An error occurred');
        }
    };
</script>
{% endblock %}
