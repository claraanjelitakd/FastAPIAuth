{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-10 rounded-3xl">
        <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
        <p class="text-gray-400 mb-8 text-sm">Please enter your credentials to login.</p>
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-[#151515] border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-[#151515] border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-red-900/40">
                Sign In
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-500">
            Don't have an account? <a href="/register" class="text-red-500 hover:underline">Register</a><br/>
            <a href="/forgot-password" class="text-gray-400 hover:text-white transition mt-2 inline-block">Forgot Password?</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('username', document.getElementById('email').value);
        formData.append('password', document.getElementById('password').value);
        
        try {
            const response = await fetch('/api/v1/login/access-token', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            
            if (response.ok) {
                localStorage.setItem('token', data.access_token);
                window.location.href = '/dashboard';
            } else {
                alert(data.detail || 'Login failed');
            }
        } catch (err) {
            alert('An error occurred');
        }
    };
</script>
{% endblock %}
