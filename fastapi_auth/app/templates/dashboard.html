{% extends "base.html" %}

{% block content %}
<div class="mt-10">
    <div class="flex justify-between items-end mb-10">
        <div>
            <h1 class="text-4xl font-bold text-white mb-2">Welcome Back, <span id="userName" class="text-red-500">...</span></h1>
            <p class="text-gray-400">Manage your account and profile settings.</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="glass p-8 rounded-3xl col-span-2">
            <h3 class="text-xl font-bold text-white mb-6">Profile Information</h3>
            <div class="space-y-4">
                <div class="flex justify-between border-b border-white/5 pb-4">
                    <span class="text-gray-500">Full Name</span>
                    <span id="profileName" class="text-white font-medium">...</span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-4">
                    <span class="text-gray-500">Email Address</span>
                    <span id="profileEmail" class="text-white font-medium">...</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-500">Status</span>
                    <span id="profileStatus" class="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-xs font-bold uppercase">Verified</span>
                </div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold text-white mb-6">Account Summary</h3>
            <div class="bg-red-600/10 border border-red-500/20 p-4 rounded-2xl mb-6">
                <p class="text-sm text-red-500 font-medium mb-1">Security Level</p>
                <p class="text-2xl font-bold text-white">High</p>
            </div>
            <div id="adminPanel" class="hidden mb-4">
                <a href="/admin" class="block w-full bg-red-600 hover:bg-red-700 text-white text-center font-bold py-3 rounded-xl transition shadow-lg shadow-red-900/20">
                    VIEW Users
                </a>
            </div>
            <button onclick="logout()" class="w-full bg-white/5 hover:bg-white/10 text-white font-bold py-3 rounded-xl transition">
                Sign Out
            </button>
        </div>
    </div>
</div>

<script>
    async function loadUser() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login';
            return;
        }

        try {
            const response = await fetch('/api/v1/users/me', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            if (response.ok) {
                document.getElementById('userName').innerText = data.full_name || data.email;
                document.getElementById('profileName').innerText = data.full_name || 'N/A';
                document.getElementById('profileEmail').innerText = data.email;
                document.getElementById('profileStatus').innerText = data.is_verified ? 'Verified' : 'Unverified';
                
                if (data.is_superuser) {
                    document.getElementById('adminPanel').classList.remove('hidden');
                }
            } else {
                localStorage.removeItem('token');
                window.location.href = '/login';
            }
        } catch (err) {
            console.error(err);
        }
    }

    loadUser();
</script>
{% endblock %}
