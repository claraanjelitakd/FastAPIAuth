{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20">
    <div class="glass p-10 rounded-3xl">
        <h2 class="text-3xl font-bold text-white mb-2">Forgot Password</h2>
        <p class="text-gray-400 mb-8 text-sm">Enter your email and we'll send you a link to reset your password.</p>
        
        <form id="forgotForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                <input type="email" id="email" required class="w-full bg-[#151515] border border-white/10 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-red-500 outline-none transition">
            </div>
            
            <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-red-900/40">
                Send Reset Link
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm text-gray-500">
            Remembered your password? <a href="/login" class="text-red-500 hover:underline">Sign In</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('forgotForm').onsubmit = async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        
        try {
            const response = await fetch(`/api/v1/password-recovery/${email}`, {
                method: 'POST'
            });
            const data = await response.json();
            
            if (response.ok) {
                alert('Reset link sent! Please check your email.');
            } else {
                alert(data.detail || 'Failed to send link');
            }
        } catch (err) {
            alert('An error occurred');
        }
    };
</script>
{% endblock %}
